services:
  postgres:
    image: postgres:16-alpine
    container_name: webapp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-admindb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-admindb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webapp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webapp-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-admindb}
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASS: ${POSTGRES_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-bXlTZWNyZXRLZXlGb3JKV1RNdXN0QmVBdExlYXN0MjU2Qml0c0xvbmdGb3JIUzI1NkFsZ29yaXRobTIwMjQ=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    networks:
      - webapp-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  webapp-network:
    driver: bridge
