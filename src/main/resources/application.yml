spring:
  application:
    name: WebApp

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/admindb}
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    show-sql: false

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTMustBeAtLeast256BitsLongForHS256Algorithm2024}
  expiration: ${JWT_EXPIRATION:86400000}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true

jwt:
  secret: testSecretKeyForJWTMustBeAtLeast256BitsLongForHS256AlgorithmTesting
  expiration: 3600000

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres:5432/admindb
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect